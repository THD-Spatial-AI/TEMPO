techs:
#TRANSMISSION+++
    # inter-zonal
    power_lines:  # Generic HVAC inter-zonal transmission technology
        essentials:
            name: 'Transmission Power Plants'
            color: '#966F9E'
            parent: transmission
            carrier: electricity
        constraints:
            energy_cap_max: .inf  # Capacidad infinita para conexión de plantas
            energy_eff: 1.0       # Sin pérdidas (asumimos distancia corta)
            lifetime: 40
        costs:
            monetary:
                interest_rate: 0.1
                energy_cap_per_distance: 0.91 # USD/kW/km 3.9 ($M/mile)/2656 MWe  https://www.sciencedirect.com/science/article/pii/S2589004221014668

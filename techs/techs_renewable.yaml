##
# TECHNOLOGY DEFINITIONS
##

# Note: '-start' and '-end' is used in tutorial documentation only

techs:
    ##
    # Supply
    ##
    
    # biogas
    biogas:
        essentials:
            name: 'Biogas power plant'
            color: '#5AA24D'
            parent: supply
            carrier_out: electricity
        constraints:
            energy_cap_max: .inf  # Can be overridden at location level
            resource: inf
            energy_eff: 0.3
            lifetime: 30
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 1384  # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 26.82 # USD/kW/year Report of the cost for every generation tecnology, may 2023       
                om_prod: 0.0176 # USD/kWh 17,6 (USD/MWh) https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
    # biogas-end
    
    
    # biofuels
    biomass:
        essentials:
            name: 'Biomass power plant'
            color: '#D800FF'
            parent: supply
            carrier_out: electricity
        constraints:
            energy_cap_max: .inf  # Can be overridden at location level
            resource: inf
            energy_eff: 0.25
            lifetime: 30
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 3885 # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 75.16 # USD/kW/year Report of the cost for every generation tecnology, may 2023    
                om_prod: 0.005 # USD/kWh 5 USD/MWh https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf     
    # biofuels-end    

    # geothermal
    geo:
        essentials:
            name: 'Geothermal power plant'
            color: '#873737'
            parent: supply
            carrier_out: electricity
        constraints:
            energy_cap_max: .inf  # Can be overridden at location level
            resource: inf
            lifetime: 50
            energy_eff: 0.15
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 5291  # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_prod: 0.0011 # USD/kWh 1,1 (USD/MWh) https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 153.54 # USD/kW/year Report of the cost for every generation tecnology, may 2023
    # geothermal-end 
    
    # wind
    wind:
        essentials:
            name: 'On-shore wind power'
            color: '#47D154'
            parent: supply_plus
            carrier_out: electricity
        constraints:
            resource_unit: energy_per_cap
            lifetime: 25
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 1534  # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 40.74 # USD/kW/year Report of the cost for every generation tecnology, may 2023          
    # wind-end    

    # pv
    pv:
        essentials:
            name: 'Photovoltaic power farm-scale'
            color: '#F9FF2C'
            parent: supply_plus
            carrier_out: electricity
        constraints:
            resource_unit: energy_per_cap
            lifetime: 30
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 941  # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 19.22 # USD/kW/year Report of the cost for every generation tecnology, may 2023
    # pv
    
    # csp farm-start
    csp:
        essentials:
            name: 'CSP Power'
            color: '#99CB48'
            parent: supply_plus
            carrier_out: electricity
        constraints:
            resource_unit: energy_per_cap
            lifetime: 30
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 6381  # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 123.74 # USD/kW/year Report of the cost for every generation tecnology, may 2023                    
    # csp farm-end        
 
    #hydro run-of-river
    run-of-river-hydro:
        essentials:
            name: 'Hydroelectric run-of-river power'
            color: '#64D7CE'
            parent: supply_plus
            carrier_out: electricity
        constraints:
            resource_eff: 0.80
            lifetime: 30
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 4746 # https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 138.03 # USD/kW/year Report of the cost for every generation tecnology, may 2023
    #hydro run-of-river-end
    
    #hydro run-of-river
    run-of-river-mini-hydro:
        essentials:
            name: 'Mini Hydroelectric run-of-river power'
            color: '#00FFC5'
            parent: supply_plus
            carrier_out: electricity
        constraints:
            resource_eff: 0.7
            lifetime: 30
        costs:
            monetary:
                interest_rate: 0.10
                energy_cap: 2274 # US/kW https://www.cne.cl/wp-content/uploads/2024/06/ICTG-Mayo-2024.pdf
                om_annual: 69.24 # USD/kW/year Report of the cost for every generation tecnology, may 2023
    #hydro run-of-river-end
    
name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

# Use Node.js 24 for all actions (avoids Node 20 deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  security-events: write   # required for CodeQL / SARIF upload

jobs:
  # ── 1. Secret scanning (Gitleaks CLI — no license required) ──────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    # Real leaked credentials must be rotated; this job reports findings but
    # should not block other CI jobs while false-positives are triaged.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and run Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | head -1 | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source=. --config=.gitleaks.toml --exit-code=1

  # ── 2. Frontend — npm audit ───────────────────────────────────────────────
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix known resolvable vulnerabilities
        # npm audit fix modifies only package-lock.json in CI, not the working tree.
        # The real package-lock.json is already patched and committed.
        run: npm audit fix --legacy-peer-deps || true

      - name: Audit (fail on critical)
        run: npm audit --audit-level=critical --omit=dev

  # ── 3. Go backend — govulncheck ───────────────────────────────────────────
  govulncheck:
    name: govulncheck (Go backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: backend-go
        run: govulncheck ./...

  # ── 4. Go backend — gosec (static analysis) ──────────────────────────────
  gosec:
    name: gosec (Go SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: backend-go
        run: gosec -fmt sarif -out gosec.sarif ./... || true

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-go/gosec.sarif
          category: gosec

  # ── 5. Python — pip-audit ────────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Python services)
    runs-on: ubuntu-latest
    # Transitive CVEs in pinned deps are informational — track in TASKS file
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install --upgrade pip-audit

      - name: Prepare calliope service audit environment
        # Create a dedicated venv with setuptools pre-installed, then use
        # --prefer-binary so pip downloads pre-built wheels (pandas, etc.)
        # instead of building from source — avoiding the pkg_resources error
        # that occurs in PEP-517 isolated build environments.
        run: |
          python -m venv /tmp/calliope-audit
          /tmp/calliope-audit/bin/pip install --upgrade pip setuptools wheel
          /tmp/calliope-audit/bin/pip install --prefer-binary \
            -r python/requirements.txt \
            -r python/requirements.service.txt

      - name: Audit calliope service requirements
        # --path: audit an already-installed environment instead of letting
        # pip-audit create its own isolated venv (which lacks setuptools).
        run: pip-audit --path /tmp/calliope-audit

      - name: Prepare OSM processing audit environment
        run: |
          python -m venv /tmp/osm-audit
          /tmp/osm-audit/bin/pip install --upgrade pip setuptools wheel
          /tmp/osm-audit/bin/pip install --prefer-binary \
            -r osm_processing/requirements.txt

      - name: Audit OSM processing requirements
        run: pip-audit --path /tmp/osm-audit

  # ── 6. Python — Bandit (SAST) ────────────────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r python/ osm_processing/ \
            -x python/.venv-calliope \
            --severity-level medium \
            -f sarif -o bandit.sarif || true

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  # ── 7. Container — Trivy ──────────────────────────────────────────────────
  trivy:
    name: Trivy (Docker image scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tempo-app:scan .

      - name: Run Trivy (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tempo-app:scan'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy

  # ── 8. CodeQL (JavaScript/TypeScript) ────────────────────────────────────
  codeql:
    name: CodeQL (JavaScript SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-js


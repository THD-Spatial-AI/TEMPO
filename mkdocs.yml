  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Quick Start: getting-started/quick-start.md
  - User Guide:
      - Creating a Model: user-guide/creating-a-model.md
      - Locations: user-guide/locations.md
      - Links: user-guide/links.md
      - Technologies: user-guide/technologies.md
      - Time Series: user-guide/time-series.md
      - Parameters & Scenarios: user-guide/parameters-scenarios.md
      - Running Optimization: user-guide/running-optimization.md
      - Results: user-guide/results.md
      - Import & Export: user-guide/import-export.md
  - Map & Geographic Data:
      - Map Interface: map/map-interface.md
      - OSM Infrastructure Layers: map/osm-layers.md
      - GeoServer Setup: map/geoserver.md
  - OSM Data Processing:
      - Overview: osm-processing/overview.md
      - Downloading OSM Data: osm-processing/downloading-data.md
      - Extracting Power Infrastructure: osm-processing/extracting-data.md
  - Development:
      - Development Setup: development/setup.md
      - Building the Desktop App: development/building.md
      - Project Structure: development/project-structure.md
  - Reference:
      - Technology Templates: reference/technology-templates.md
      - Backend API: reference/api-endpoints.md

